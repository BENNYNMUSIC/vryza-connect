<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Vryza+...</title>
    <style>
        body {
            background-color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #475569;
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <p style="font-size: 14px; font-weight: 600; margin-bottom: 8px;">Loading your network...</p>
        <div style="width: 24px; height: 24px; border: 3px solid #cbd5e1; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
    </div>

    <script>
        // Dynamically detects the current folder path context to maintain repository structure
        const currentPath = window.location.pathname;
        
        if (currentPath.endsWith('index.html')) {
            // If the URL directly specifies index.html, swap it for home.html
            window.location.href = currentPath.replace('index.html', 'home.html');
        } else {
            // Ensure trailing slash structure compatibility
            const baseDir = currentPath.endsWith('/') ? currentPath : currentPath + '/';
            window.location.href = baseDir + 'home.html';
        }
    </script>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
