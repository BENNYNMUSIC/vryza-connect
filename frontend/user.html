<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vryza+ | View Profile</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body { font-family: "Inter", sans-serif; transition: background-color 0.2s; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen pt-10">

  <main class="max-w-2xl mx-auto px-4">
    
    <div id="profileCard" class="theme-card bg-white rounded-3xl shadow-sm border border-slate-200 p-8 transition-colors duration-200">
      
      <div id="profileContainer" class="space-y-6">
        <div class="flex items-center justify-center py-12">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
          <span class="ml-3 text-slate-500 font-medium">Retrieving community identity profile...</span>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Backend Pipeline Endpoint Route Locator
    const API = "https://vryza-connect-backend-production.up.railway.app";

    // Application Credentials Parsing
    const token = localStorage.getItem("token");
    const currentUser = JSON.parse(localStorage.getItem("user") || null);
    const profileUserId = localStorage.getItem("profileUserId");

    // Session Verification Shield
    if (!token || !profileUserId) {
      alert("Session footprint missing or profile target target unset.");
      window.location.href = "auth.html";
    }

    // Helper method to resolve authorizations correctly
    function getHeaders() {
      return {
        "Authorization": token.startsWith("Bearer ") ? token : `Bearer ${token}`,
        "Content-Type": "application/json"
      };
    }

    // ================= DATA LOADING FLOW PIPELINE =================
    async function loadProfile() {
      const container = document.getElementById("profileContainer");
      
      try {
        const res = await fetch(`${API}/api/user/${profileUserId}`, {
          method: "GET",
          headers: getHeaders()
        });

        const data = await res.json();

        if (!res.ok) {
          container.innerHTML = `<div class="text-center text-red-500 font-bold p-4">${data.message || "Failed to parse target account identification."}</div>`;
          return;
        }

        const user = data.user;
        
        // Render detailed card mapping layout
        container.innerHTML = `
          <div class="flex flex-col sm:flex-row items-center gap-5 pb-6 border-b border-slate-100 dark-border-target">
            <div class="w-24 h-24 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-500 text-white flex items-center justify-center text-3xl font-black shadow-md">
              ${user.username ? user.username.charAt(0).toUpperCase() : "U"}
            </div>
            <div class="text-center sm:text-left">
              <h1 class="text-3xl font-black text-slate-800 dark-text-target tracking-tight">${user.username || "Anonymous Connection"}</h1>
              <p class="text-slate-400 text-sm mt-1">${user.email || "Protected Network Address"}</p>
            </div>
          </div>

          <div class="space-y-4 text-sm text-slate-600 dark-text-target-muted pt-2">
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 theme-inner-card">
              <p class="font-bold text-slate-400 uppercase text-[10px] tracking-wider mb-1">Personal Biography Statement</p>
              <p class="text-base text-slate-700 dark-text-target italic">"${user.bio || "No status bio updated by the account owner yet."}"</p>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 theme-inner-card"><span class="block text-[10px] uppercase font-bold text-slate-400">Location</span><span class="font-semibold text-slate-800 dark-text-target">${user.location || "Earth"}</span></div>
              <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 theme-inner-card"><span class="block text-[10px] uppercase font-bold text-slate-400">Gender</span><span class="font-semibold text-slate-800 dark-text-target">${user.gender || "Not disclosed"}</span></div>
              <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 theme-inner-card"><span class="block text-[10px] uppercase font-bold text-slate-400">Age Bracket</span><span class="font-semibold text-slate-800 dark-text-target">${user.age || "Hidden"}</span></div>
            </div>
          </div>

          <div class="pt-4 flex flex-col sm:flex-row gap-3">
            <button id="followBtn" onclick="followUser()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3.5 px-6 rounded-2xl font-bold transition shadow-md shadow-blue-100 active:scale-[0.99]">
              Loading Status...
            </button>
            <button onclick="window.location.href='chat.html'" class="bg-slate-800 hover:bg-slate-900 text-white py-3.5 px-6 rounded-2xl font-bold transition shadow-md active:scale-[0.99]">
              Message Profile
            </button>
          </div>
        `;

        // Check if current logged-in user is already following this person
        updateFollowButtonUI(user.followers && currentUser ? user.followers.includes(currentUser.id || currentUser._id) : false);

      } catch (err) {
        console.error("❌ PROFILE SYSTEM LOADING FAULT:", err);
        container.innerHTML = `<div class="text-center text-red-500 font-bold p-4">Network pipeline dropped link to profiles.</div>`;
      }
    }

    // ================= INTERACTIVE TOGGLE CONTROLLER =================
    function updateFollowButtonUI(isFollowing) {
      const btn = document.getElementById("followBtn");
      if (!btn) return;

      if (isFollowing) {
        btn.innerText = "🤝 Connected (Unfollow)";
        btn.className = "flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 py-3.5 px-6 rounded-2xl font-bold transition active:scale-[0.99]";
      } else {
        btn.innerText = "➕ Follow Network Node";
        btn.className = "flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3.5 px-6 rounded-2xl font-bold transition shadow-md shadow-blue-100 active:scale-[0.99]";
      }
    }

    // ================= DATA MUTATION CONTROLLERS =================
    async function followUser() {
      const btn = document.getElementById("followBtn");
      if (btn) btn.disabled = true;

      try {
        const res = await fetch(`${API}/api/user/follow/${profileUserId}`, {
          method: "PUT",
          headers: getHeaders()
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || "Mutation execution rejected by remote data engine.");
          return;
        }

        // True signals following addition, false indicates removal fallback
        updateFollowButtonUI(data.following);

      } catch (err) {
        console.error("❌ CRITICAL RELATION ENGINE ABORT:", err);
        alert("Server failed to commit follow updates.");
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // Start profile extraction on window parsing completion
    document.addEventListener("DOMContentLoaded", loadProfile);
  </script>

  <script src="settings.js"></script>

</body>
</html>
