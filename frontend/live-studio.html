<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vryza+ Live Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#111827;
color:white;
}

header{
height:70px;
background:#1f2937;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
border-bottom:1px solid #333;
}

header h1{
font-size:24px;
}

header span{
color:#ff3b5c;
}

.container{
display:grid;
grid-template-columns:320px 1fr;
min-height:calc(100vh - 70px);
}

/* Sidebar */

.sidebar{
background:#1b2431;
padding:20px;
border-right:1px solid #333;
}

.profile{
text-align:center;
margin-bottom:30px;
}

.profile img{
width:100px;
height:100px;
border-radius:50%;
border:3px solid #ff3b5c;
object-fit:cover;
}

.profile h2{
margin-top:10px;
font-size:20px;
}

.status{
margin-top:10px;
display:inline-block;
padding:8px 18px;
border-radius:50px;
background:#444;
font-size:14px;
}

.status.live{
background:red;
animation:pulse 1.2s infinite;
}

@keyframes pulse{

0%{opacity:1;}

50%{opacity:.5;}

100%{opacity:1;}

}

.stats{

display:grid;
gap:15px;

}

.stat-card{

background:#263445;
padding:15px;
border-radius:12px;
text-align:center;

}

.stat-card h3{

font-size:14px;
color:#bbb;

}

.stat-card p{

font-size:24px;
font-weight:bold;
margin-top:8px;

}

/* Main */

.main{

padding:30px;

}

.card{

background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 0 15px rgba(0,0,0,.2);

}

.card h2{

margin-bottom:20px;
font-size:22px;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;
margin-bottom:8px;

}

input,
textarea,
select{

width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2d3748;
color:white;
font-size:15px;

}

textarea{

resize:none;
height:100px;

}

.row{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

}

.copy-group{

display:flex;
gap:10px;

}

.copy-group input{

flex:1;

}

button{

cursor:pointer;
border:none;
border-radius:10px;
padding:12px 20px;
font-size:15px;
transition:.3s;

}

.copy-btn{

background:#2563eb;
color:white;

}

.copy-btn:hover{

background:#1d4ed8;

}

.show-btn{

background:#4b5563;
color:white;

}

.show-btn:hover{

background:#374151;

}

.go-live{

background:#ff3b5c;
color:white;
width:100%;
margin-top:10px;
font-size:18px;

}

.go-live:hover{

background:#d91d44;

}

.stop-live{

background:#444;
color:white;
width:100%;
margin-top:10px;

}

.stop-live:hover{

background:#333;

}

/* Preview */

.preview{

width:100%;
height:500px;
background:black;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}

.preview video{

width:100%;
height:100%;
object-fit:cover;

}

/* Footer */

.footer{

text-align:center;
padding:20px;
color:#888;

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.sidebar{

border-right:none;
border-bottom:1px solid #333;

}

.row{

grid-template-columns:1fr;

}

}

</style>
</head>

<body>

<header>

<h1>Vryza<span>+</span> Live Studio</h1>

<div id="welcomeUser">
Welcome Creator
</div>

</header>

<div class="container">

<!-- Sidebar -->

<div class="sidebar">

<div class="profile">

<img id="profilePic" src="default-avatar.png">

<h2 id="username">
Streamer
</h2>

<div id="liveStatus" class="status">
⚫ Offline
</div>

</div>

<div class="stats">

<div class="stat-card">

<h3>Current Viewers</h3>

<p id="viewerCount">
0
</p>

</div>

<div class="stat-card">

<h3>Likes</h3>

<p id="likesCount">
0
</p>

</div>

<div class="stat-card">

<h3>Comments</h3>

<p id="commentsCount">
0
</p>

</div>

<div class="stat-card">

<h3>Duration</h3>

<p id="duration">
00:00:00
</p>

</div>

</div>

</div>

<!-- Main -->

<div class="main">

<div class="card">

<h2>Stream Information</h2>

<div class="form-group">

<label>Stream Title</label>

<input
type="text"
id="streamTitle"
placeholder="Enter stream title">

</div>

<div class="form-group">

<label>Description</label>

<textarea
id="streamDescription"
placeholder="Tell viewers what this stream is about..."></textarea>

</div>

<div class="form-group">

<label>Category</label>

<select id="category">

<option>Gaming</option>
<option>Music</option>
<option>Education</option>
<option>Entertainment</option>
<option>Technology</option>
<option>Sports</option>
<option>Lifestyle</option>
<option>Other</option>

</select>

</div>

</div>

<div class="card">

<h2>Encoder Settings</h2>

<div class="row">

<div>

<label>RTMP Server</label>

<div class="copy-group">

<input
id="rtmpServer"
readonly
value="rtmp://YOUR_SERVER/live">

<button
class="copy-btn"
id="copyServer">

Copy

</button>

</div>

</div>

<div>

<label>Playback URL</label>

<div class="copy-group">

<input
id="playbackUrl"
readonly>

<button
class="copy-btn"
id="copyPlayback">

Copy

</button>

</div>

</div>

</div>

<br>

<label>Stream Key</label>

<div class="copy-group">

<input
id="streamKey"
type="password"
readonly>

<button
class="show-btn"
id="toggleKey">

Show

</button>

<button
class="copy-btn"
id="copyKey">

Copy

</button>

</div>

<button
class="go-live"
id="goLiveBtn">

🔴 GO LIVE

</button>

<button
class="stop-live"
id="stopLiveBtn">

⏹ END STREAM

</button>

</div>

<div class="card">

<h2>Live Preview</h2>

<div class="preview">

<video
id="videoPreview"
controls
autoplay
muted>

</video>

</div>

</div>

<div class="footer">

Vryza+ Live Studio © 2026

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
<script src="live-studio.js"></script>

</body>
</html>
