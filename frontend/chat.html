<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vryza+ Chat</title>

  <link rel="shortcut icon" href="images/vryza connect.png" type="image/x-icon" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Inter", sans-serif;
    }

    /* ================= SCROLLBAR ================= */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 20px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    video {
      border-radius: 16px;
    }
  </style>
</head>

<body class="bg-slate-100 h-screen overflow-hidden">

  <nav class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-2 rounded-xl shadow-lg">
          <img src="images/vryza connect.png" class="w-7 h-7 invert brightness-200" alt="logo" />
        </div>
        <h1 class="text-2xl font-black tracking-tight text-slate-800">
          Vryza<span class="text-blue-600">+</span>
        </h1>
      </div>

      <div class="flex items-center gap-6 text-sm">
        <button onclick="go('home.html')" class="text-slate-500 hover:text-blue-600 font-semibold transition">
          🏠 Home
        </button>

        <button onclick="go('profile.html')" class="text-slate-500 hover:text-blue-600 font-semibold transition">
          👤 Profile
        </button>

        <button onclick="go('chat.html')" class="relative text-blue-600 font-bold">
          💬 Chat
          <div class="absolute -bottom-2 left-0 w-full h-0.5 bg-blue-600 rounded-full"></div>
        </button>

        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-semibold transition">
          Logout
        </button>
      </div>

    </div>
  </nav>

  <main class="max-w-7xl mx-auto h-full pt-24 pb-4 px-4 md:px-6">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-5 h-full">

      <aside class="md:col-span-4 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
        <div class="p-5 border-b border-slate-100">
          <div class="flex items-center justify-between">
            <h2 class="font-bold text-slate-800 text-lg">Contacts</h2>
            <span class="bg-green-100 text-green-600 text-[10px] uppercase tracking-widest px-2 py-1 rounded-full font-bold">
              Live
            </span>
          </div>
        </div>

        <div class="p-4 border-b border-slate-100">
          <input
            type="text"
            id="searchUser"
            placeholder="Search users..."
            class="w-full bg-slate-100 px-4 py-3 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-blue-200"
          />
        </div>

        <div id="onlineUsers" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
          </div>
      </aside>

      <section class="md:col-span-8 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
        <div class="px-5 py-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
          <div>
            <h2 id="chatWith" class="font-bold text-slate-700 text-lg">
              Select a conversation
            </h2>
            <p id="typing" class="text-xs text-blue-500 mt-1 min-h-[16px]"></p>
          </div>

          <div class="flex items-center gap-2">
            <button id="startCall" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-semibold transition">
              📹 Call
            </button>

            <label for="mediaInput" class="cursor-pointer flex items-center gap-2 bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-2 rounded-xl font-semibold transition">
              📎 Media
            </label>
            <input type="file" id="mediaInput" class="hidden" accept="image/*,video/*" />
          </div>
        </div>

        <div id="videoArea" class="hidden p-4 border-b border-slate-200 bg-slate-900 grid grid-cols-2 gap-4 transition-all">
          <div class="relative">
            <video id="localVideo" autoplay muted playsinline class="w-full bg-slate-950 border border-slate-800 shadow-md"></video>
            <span class="absolute bottom-3 left-3 bg-black/60 backdrop-blur-sm text-[11px] text-white px-2 py-0.5 rounded-md font-medium">You</span>
          </div>
          <div class="relative">
            <video id="remoteVideo" autoplay playsinline class="w-full bg-slate-950 border border-slate-800 shadow-md"></video>
            <span class="absolute bottom-3 left-3 bg-black/60 backdrop-blur-sm text-[11px] text-white px-2 py-0.5 rounded-md font-medium">Peer Stream</span>
          </div>
        </div>

        <div id="messages" class="flex-1 overflow-y-auto p-6 bg-slate-50 space-y-4">
          <div id="emptyChat" class="text-center text-slate-400 text-sm mt-10 italic">
            Start chatting with someone online
          </div>
        </div>

        <div class="border-t border-slate-100 bg-white p-4">
          <div class="flex items-center gap-2 bg-slate-100 rounded-2xl p-2 focus-within:ring-2 focus-within:ring-blue-500/20 transition-all">
            <input
              id="message"
              type="text"
              placeholder="Type a message..."
              autocomplete="off"
              class="flex-1 bg-transparent border-none outline-none px-4 py-2 text-sm text-slate-700"
            />

            <button onclick="toggleRecording()" id="micBtn" class="w-11 h-11 rounded-xl bg-white hover:bg-red-50 hover:text-red-500 text-slate-500 transition shadow-sm flex items-center justify-center text-lg">
              🎤
            </button>

            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold shadow-lg shadow-blue-100 transition">
              Send
            </button>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="https://vryza-connect-backend-production.up.railway.app/socket.io/socket.io.js"></script>

  <script src="chat.js"></script>


  <script>
    function go(page) {
      window.location.href = page;
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      localStorage.removeItem("chatUserId");
      localStorage.removeItem("chatUsername");
      window.location.href = "auth.html";

    }
  </script>

</body>
</html>
