<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Vryza Connect | Home</title>

  <!-- FAVICON -->
  <link
    rel="shortcut icon"
    href="images/vryza connect.png"
    type="image/x-icon"
  />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <meta
    name="theme-color"
    content="#0f172a"
  >

  <link
    rel="apple-touch-icon"
    href="images/icon-192.png"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black"
  >

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SOCKET.IO -->
  <script src="https://vryza-connect-backend-production.up.railway.app/socket.io/socket.io.js"></script>

  <!-- FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
  </style>

</head>

<body class="bg-slate-50 pt-20">

  <!-- NAVBAR -->
  <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed top-0 left-0 w-full z-50 border-b border-slate-200">

    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">

      <!-- LEFT -->
      <div class="flex items-center gap-12">

        <!-- LOGO -->
        <div class="flex items-center gap-2">

          <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-1.5 rounded-lg shadow-lg shadow-blue-200">

            <img
              src="images/vryza connect.png"
              class="w-7 h-7 invert brightness-200"
              alt="logo"
            >

          </div>

          <span class="font-black text-slate-800 text-xl tracking-tight">
            Vryza<span class="text-blue-600">+</span>
          </span>

        </div>

        <!-- NAV BUTTONS -->
        <div class="flex items-center gap-6">

          <button
            onclick="go('home.html')"
            class="text-blue-600 font-bold"
          >
            🏠 Home
          </button>

          <button
            onclick="go('profile.html')"
            class="text-slate-500 hover:text-blue-600 transition font-semibold"
          >
            👤 Profile
          </button>

          <button
            onclick="go('chat.html')"
            class="text-slate-500 hover:text-blue-600 transition font-semibold"
          >
            💬 Chat
          </button>

          <button
            onclick="go('settings.html')"
            class="text-slate-500 hover:text-blue-600 transition font-semibold"
          >
            ⚙️ Settings
          </button>

        </div>

      </div>

      <!-- LOGOUT -->
      <button
        onclick="logout()"
        class="text-red-500 font-semibold hover:text-red-700 transition"
      >
        🚪 Logout
      </button>

    </div>

  </nav>

  <!-- MAIN -->
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 px-6 mt-4">

    <!-- FEED -->
    <div class="lg:col-span-8 space-y-8">

      <!-- CREATE POST -->
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">

        <div class="flex items-center gap-3 mb-4">

          <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
            You
          </div>

          <h2 class="text-lg font-bold text-slate-800 tracking-tight">
            Share an update
          </h2>

        </div>

        <!-- IMAGE -->
        <div class="relative group border-2 border-dashed border-slate-200 rounded-2xl p-4 transition hover:border-blue-300 mb-4 bg-slate-50/50 text-center">

         <input
  type="file"
  id="imageFile"
  accept="image/*,video/*"
  class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
>

          <div class="text-slate-500 text-sm py-2">
            <span class="text-blue-600 font-semibold">
              Click to upload image
            </span>
          </div>

        </div>

        <!-- CAPTION -->
        <textarea
          id="caption"
          placeholder="What's happening?"
          class="w-full p-4 bg-slate-50 border-none rounded-2xl mb-4 focus:ring-2 focus:ring-blue-100 outline-none text-slate-700 resize-none"
          rows="3"
        ></textarea>

        <!-- POST BUTTON -->
        <button
          onclick="createPost()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98]"
        >
          Post to Feed
        </button>

      </div>

      <!-- POSTS -->
      <div id="feed" class="space-y-6"></div>

    </div>

    <!-- SIDEBAR -->
    <div class="lg:col-span-4 space-y-6">

      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-24">

        <!-- ONLINE USERS -->
        <h3 class="font-bold text-slate-800 mb-4 flex items-center justify-between">

          <span>Active Now</span>

          <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>

        </h3>

        <div
          id="onlineUsers"
          class="space-y-3 max-h-[200px] overflow-y-auto pr-2"
        ></div>

        <!-- QUICK CHAT -->
        <hr class="my-6 border-slate-100">

        <h3 class="font-bold text-slate-800 mb-4">
          💬 Quick Chat
        </h3>

        <div class="bg-slate-50 rounded-2xl p-3 mb-3">

          <input
            id="receiverId"
            placeholder="Select a user..."
            class="w-full bg-transparent text-xs text-slate-500 font-medium"
            readonly
          >

        </div>

        <div
          id="messages"
          class="h-64 overflow-y-auto rounded-2xl mb-4 bg-slate-50 border border-slate-100 p-4 space-y-3 text-sm"
        ></div>

        <div class="flex gap-2 bg-white border border-slate-200 p-1.5 rounded-2xl focus-within:border-blue-400 transition">

          <input
            id="message"
            placeholder="Say hi..."
            class="flex-1 px-3 py-2 text-sm outline-none bg-transparent"
          >

          <button
            onclick="sendMessage()"
            class="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-md"
          >
            ➤
          </button>

        </div>

        <!-- GROUP CHAT -->
        <hr class="my-6 border-slate-100">

        <h3 class="font-bold text-slate-800 mb-4">
          🌍 Group Chat
        </h3>

        <div
          id="groupMessages"
          class="h-64 overflow-y-auto rounded-2xl mb-4 bg-slate-50 border border-slate-100 p-4 space-y-3 text-sm"
        ></div>

        <div class="flex gap-2 bg-white border border-slate-200 p-1.5 rounded-2xl focus-within:border-indigo-400 transition">

          <input
            id="groupMessage"
            placeholder="Message everyone..."
            class="flex-1 px-3 py-2 text-sm outline-none bg-transparent"
          >

          <button
            onclick="sendGroupMessage()"
            class="bg-indigo-600 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-md"
          >
            ➤
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- NOTIFICATIONS -->
  <div id="notifications"></div>

  <!-- MAIN SCRIPT -->
  <script src="script.js"></script>

  <!-- NAVIGATION -->
  <script>
    function go(page) {
      window.location.href = page;
    }
  </script>

  <!-- LOGOUT -->
  <script>
    function logout() {

      localStorage.clear();

      window.location.href =
        "auth.html";
    }
  </script>

  <!-- SERVICE WORKER -->
  <script>
    if ("serviceWorker" in navigator) {

      navigator.serviceWorker
        .register("/service-worker.js")
        .then(() => {

          console.log(
            "Service Worker Registered"
          );
        });
    }
  </script>

</body>
</html>
