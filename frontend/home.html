<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vryza Connect | Home</title>

  <link rel="shortcut icon" href="images/vryza connect.png" type="image/x-icon" />

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://vryza-connect-backend-production.up.railway.app/socket.io/socket.io.js"></script>

  <link href="https://fonts.googleapis.com/css2=family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
  </style>
</head>

<body class="bg-slate-50 pt-20">

  <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed top-0 left-0 w-full z-50 border-b border-slate-200">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">
      
      <div class="flex items-center gap-12">
        <div class="flex items-center gap-3 bg-slate-100/80 px-3 py-1.5 rounded-2xl border border-slate-200/60 shadow-inner">
          <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-1.5 rounded-xl shadow-md shadow-blue-200">
            <img src="images/vryza connect.png" class="w-6 h-6 invert brightness-200" alt="logo">
          </div>
          <span class="font-black text-slate-800 text-lg tracking-tight">
            Vryza<span class="bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">+</span>
          </span>
        </div>

        <div class="flex items-center gap-6">
          <button onclick="go('home.html')" class="text-blue-600 font-bold flex items-center gap-1">🏠 Home</button>
          <button onclick="go('profile.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">👤 Profile</button>
          <button onclick="go('chat.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">💬 Chat</button>
           <button onclick="go('friends.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">Friends</button>
           <button onclick="go('live.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">LIVE</button>
          <button onclick="go('settings.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">⚙️ Settings</button>
        </div>
      </div>

      <button onclick="logout()" class="text-red-500 font-semibold hover:text-red-700 transition flex items-center gap-1">
        🚪 Logout
      </button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 px-6 mt-4">

    <div class="lg:col-span-8 space-y-8">

      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-100 to-indigo-50 text-blue-600 font-bold flex items-center justify-center border border-blue-200 shadow-inner">
            You
          </div>
          <h2 class="text-lg font-bold text-slate-800 tracking-tight">Share an update</h2>
        </div>

        <div class="relative group border-2 border-dashed border-slate-200 rounded-2xl p-4 transition hover:border-blue-300 mb-4 bg-slate-50/50 text-center">
          <input type="file" id="imageFile" accept="image/*,video/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="previewUploadFile(this)">
          <div id="uploadPlaceholderText" class="text-slate-500 text-sm py-2">
            <span class="text-blue-600 font-semibold">Click to upload media file</span> (Image / Video)
          </div>
          <div id="mediaDisplayPreview" class="hidden mt-2 max-w-xs mx-auto relative rounded-xl overflow-hidden border border-slate-200 shadow-sm"></div>
        </div>

        <textarea id="caption" placeholder="What's happening?" class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl mb-4 focus:border-blue-300 focus:bg-white focus:ring-0 outline-none text-slate-700 resize-none transition-all" rows="3"></textarea>

        <button onclick="createPost()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
          Post to Feed
        </button>
      </div>

      <div id="feed" class="space-y-6"></div>
    </div>

    <div class="lg:col-span-4 space-y-6">
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-24">
        
        <h3 class="font-bold text-slate-800 mb-4 flex items-center justify-between">
          <span>Active Now</span>
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
          </span>
        </h3>
        <div id="onlineUsers" class="space-y-3 max-h-[200px] overflow-y-auto pr-2"></div>

        <hr class="my-6 border-slate-100">
        <h3 class="font-bold text-slate-800 mb-4">💬 Quick Chat</h3>
        <div class="bg-slate-50 rounded-2xl p-3 mb-3 border border-slate-100 shadow-inner">
          <input id="receiverId" placeholder="Select an active user to begin..." class="w-full bg-transparent text-xs text-slate-600 font-bold outline-none border-none placeholder-slate-400" readonly>
        </div>
        <div id="messages" class="h-64 overflow-y-auto rounded-2xl mb-4 bg-slate-50 border border-slate-100 p-4 space-y-3 text-sm flex flex-col"></div>
        
        <div class="flex gap-2 bg-white border border-slate-200 p-1.5 rounded-2xl focus-within:border-blue-400 transition shadow-sm">
          <input id="message" placeholder="Say hi..." class="flex-1 px-3 py-2 text-sm outline-none bg-transparent">
          <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-md transition">
            ➤
          </button>
        </div>

        <hr class="my-6 border-slate-100">
        <h3 class="font-bold text-slate-800 mb-4">🌍 Group Chat</h3>
        <div id="groupMessages" class="h-64 overflow-y-auto rounded-2xl mb-4 bg-slate-50 border border-slate-100 p-4 space-y-3 text-sm flex flex-col"></div>
        
        <div class="flex gap-2 bg-white border border-slate-200 p-1.5 rounded-2xl focus-within:border-indigo-400 transition shadow-sm">
          <input id="groupMessage" placeholder="Message everyone..." class="flex-1 px-3 py-2 text-sm outline-none bg-transparent">
          <button onclick="sendGroupMessage()" class="bg-indigo-600 hover:bg-indigo-700 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-md transition">
            ➤
          </button>
        </div>

      </div>
    </div>

  </div>

  <script src="script.js"></script>

  <script>
    function go(page) {
      window.location.href = page;
    }
    function logout() {
      localStorage.clear();
      window.location.href = "auth.html";
    }
  </script>

  <script>
    function previewUploadFile(input) {
      const targetBox = document.getElementById("mediaDisplayPreview");
      const labelText = document.getElementById("uploadPlaceholderText");
      if (!input.files || !input.files[0] || !targetBox) return;

      const file = input.files[0];
      const reader = new FileReader();
      labelText.innerText = `Selected: ${file.name}`;

      reader.onload = function(e) {
        targetBox.classList.remove("hidden");
        if (file.type.startsWith("image/")) {
          targetBox.innerHTML = `<img src="${e.target.result}" class="w-full h-auto object-cover max-h-40 block rounded-xl"/>`;
        } else {
          targetBox.innerHTML = `<video src="${e.target.result}" class="w-full h-auto object-cover max-h-40 block rounded-xl" muted autoplay loop></video>`;
        }
      }
      reader.readAsDataURL(file);
    }
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js").then(() => {
        console.log("Service Worker Registered");
      });
    }
  </script>
</body>
</html>
