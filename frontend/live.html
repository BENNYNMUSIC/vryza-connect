<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streams</title>
    <style>
        #liveStreams {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .live-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .live-card img {
            object-fit: cover;
        }
    </style>
</head>
<body>
    <h1>Live Streams</h1>
    <button id="goLiveBtn" style="padding: 10px 20px; cursor: pointer;">Go Live</button>
    <div id="liveStreams"></div>

    <script src="live.js"></script>
</body>
</html>
