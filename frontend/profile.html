<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Vryza+ | Profile</title>

  <!-- ================= FAVICON ================= -->
  <link
    rel="shortcut icon"
    href="images/vryza connect.png"
    type="image/x-icon"
  />

  <!-- ================= TAILWIND ================= -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ================= FONT ================= -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: "Inter", sans-serif;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 20px;
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen pt-20">

  <!-- ================= NAVBAR ================= -->
  <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed top-0 left-0 w-full z-50 border-b border-slate-200">

    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">

      <!-- LOGO -->
      <div class="flex items-center gap-2">

        <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-1.5 rounded-lg shadow-lg">
          <img
            src="images/vryza connect.png"
            class="w-7 h-7 invert brightness-200"
            alt="logo"
          />
        </div>

        <span class="font-black text-slate-800 text-xl tracking-tight">
          Vryza<span class="text-blue-600">+</span>
        </span>
      </div>

      <!-- NAV -->
      <div class="flex items-center gap-6">

        <button
          onclick="go('home.html')"
          class="text-slate-500 font-semibold hover:text-blue-600 transition"
        >
          🏠 Home
        </button>

        <button
          onclick="go('profile.html')"
          class="relative py-2 px-1 text-blue-600 font-bold"
        >
          👤 Profile

          <div class="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 rounded-full"></div>
        </button>

        <button
          onclick="go('chat.html')"
          class="text-slate-500 font-semibold hover:text-blue-600 transition"
        >
          💬 Chat
        </button>
      </div>
    </div>
  </nav>

  <!-- ================= MAIN ================= -->
  <main class="max-w-6xl mx-auto px-4 md:px-6 py-8">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- ================= EDIT PROFILE ================= -->
      <aside class="space-y-6">

        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">

          <h2 class="text-lg font-bold text-slate-800 mb-6">
            ⚙️ Edit Profile
          </h2>

          <!-- AVATAR -->
          <div class="flex justify-center mb-5">

            <img
              id="avatar"
              src="images/default-avatar.png"
              class="
                w-28
                h-28
                rounded-3xl
                object-cover
                border-4
                border-blue-50
                shadow-lg
              "
            />
          </div>

          <div class="space-y-4">

            <!-- PROFILE PIC -->
            <div>

              <label class="text-[10px] uppercase font-bold text-slate-400 ml-2">
                Avatar
              </label>

              <input
                type="file"
                id="profilePic"
                class="
                  w-full
                  text-sm
                  bg-slate-50
                  rounded-xl
                  p-3
                "
              />
            </div>

            <!-- BIO -->
            <textarea
              id="bio"
              placeholder="Your bio..."
              rows="3"
              class="
                w-full
                p-3
                bg-slate-50
                rounded-xl
                outline-none
                focus:ring-2
                focus:ring-blue-100
                resize-none
                text-sm
              "
            ></textarea>

            <!-- AGE + GENDER -->
            <div class="grid grid-cols-2 gap-3">

              <input
                id="age"
                type="number"
                placeholder="Age"
                class="
                  w-full
                  p-3
                  bg-slate-50
                  rounded-xl
                  outline-none
                  focus:ring-2
                  focus:ring-blue-100
                  text-sm
                "
              />

              <select
                id="gender"
                class="
                  w-full
                  p-3
                  bg-slate-50
                  rounded-xl
                  outline-none
                  focus:ring-2
                  focus:ring-blue-100
                  text-sm
                "
              >
                <option value="">Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>

            <!-- LOCATION -->
            <input
              id="location"
              type="text"
              placeholder="Location"
              class="
                w-full
                p-3
                bg-slate-50
                rounded-xl
                outline-none
                focus:ring-2
                focus:ring-blue-100
                text-sm
              "
            />

            <!-- ABOUT -->
            <textarea
              id="about"
              rows="4"
              placeholder="Tell people about yourself..."
              class="
                w-full
                p-3
                bg-slate-50
                rounded-xl
                outline-none
                focus:ring-2
                focus:ring-blue-100
                resize-none
                text-sm
              "
            ></textarea>

            <!-- SAVE -->
            <button
              onclick="updateProfile()"
              class="
                w-full
                bg-slate-800
                hover:bg-black
                text-white
                p-3
                rounded-2xl
                font-bold
                transition
              "
            >
              Save Changes
            </button>
          </div>
        </div>
      </aside>

      <!-- ================= PROFILE SECTION ================= -->
      <section class="lg:col-span-2 space-y-6">

        <!-- PROFILE CARD -->
        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">

          <!-- COVER -->
          <div class="relative h-52 bg-gradient-to-r from-blue-500 to-indigo-500">

            <img
              id="coverPreview"
              class="w-full h-full object-cover"
            />

            <div class="absolute bottom-4 right-4">

              <label class="
                bg-white/20
                backdrop-blur-md
                text-white
                px-4
                py-2
                rounded-xl
                cursor-pointer
                hover:bg-white/30
                transition
                text-sm
                font-semibold
              ">

                Change Cover

                <input
                  type="file"
                  id="coverImage"
                  class="hidden"
                />
              </label>
            </div>
          </div>

          <!-- PROFILE INFO -->
          <div class="p-8">

            <!-- TOP -->
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 -mt-16 mb-8">

              <!-- USERNAME -->
              <div>

                <h1
                  id="username"
                  class="
                    text-4xl
                    font-black
                    text-slate-800
                    drop-shadow-sm
                  "
                ></h1>

                <p
                  id="bioText"
                  class="text-slate-500 mt-2"
                ></p>
              </div>

              <!-- STATS -->
              <div class="flex gap-3">

                <div class="bg-blue-50 px-5 py-3 rounded-2xl text-center">

                  <p class="text-[10px] uppercase tracking-widest text-blue-400 font-bold">
                    Followers
                  </p>

                  <p
                    id="followersCount"
                    class="text-2xl font-black text-blue-600"
                  >
                    0
                  </p>
                </div>

                <div class="bg-slate-50 px-5 py-3 rounded-2xl text-center">

                  <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">
                    Following
                  </p>

                  <p
                    id="followingCount"
                    class="text-2xl font-black text-slate-700"
                  >
                    0
                  </p>
                </div>
              </div>
            </div>

            <!-- PROFILE DETAILS -->
            <div
              id="profile"
              class="
                grid
                grid-cols-1
                md:grid-cols-2
                gap-4
                text-sm
                text-slate-700
                mb-8
              "
            >
            </div>

            <!-- MESSAGE BUTTON -->
            <button
              onclick="messageUser()"
              class="
                w-full
                bg-blue-600
                hover:bg-blue-700
                text-white
                p-4
                rounded-2xl
                font-bold
                shadow-lg
                shadow-blue-100
                transition
              "
            >
              💬 Start Conversation
            </button>
          </div>
        </div>

        <!-- ================= POSTS ================= -->
        <div>

          <h2 class="text-xl font-black text-slate-800 mb-4">
            Posts
          </h2>

          <div
            id="postsContainer"
            class="space-y-6"
          >
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- ================= PROFILE SCRIPT ================= -->
  <script src="profile.js"></script>

  <!-- ================= NAVIGATION ================= -->
  <script>
    function go(page) {
      window.location.href = page;
    }

    window.onload = () => {
      const user = JSON.parse(localStorage.getItem("user"));

      if (!user) {
        window.location.href = "auth.html";
        return;
      }

      viewProfile(user._id || user.id);
    };
  </script>

</body>

</html>
