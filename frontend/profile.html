<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vryza+ | Profile</title>

  <link rel="shortcut icon" href="images/vryza connect.png" type="image/x-icon" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Inter", sans-serif;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 20px;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pt-20">

  <nav class="bg-white/80 backdrop-blur-md shadow-sm fixed top-0 left-0 w-full z-50 border-b border-slate-200">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-3">

      <div class="flex items-center gap-3 bg-slate-100/80 px-3 py-1.5 rounded-2xl border border-slate-200/60 shadow-inner">
        <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-1.5 rounded-xl shadow-md shadow-blue-200">
          <img src="images/vryza connect.png" class="w-6 h-6 invert brightness-200" alt="logo" />
        </div>
        <span class="font-black text-slate-800 text-lg tracking-tight">
          Vryza<span class="bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">+</span>
        </span>
      </div>

      <div class="flex items-center gap-6">
        <button onclick="go('home.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">🏠 Home</button>
        <button onclick="go('profile.html')" class="relative py-2 px-1 text-blue-600 font-bold flex items-center gap-1">
          👤 Profile
          <div class="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 rounded-full"></div>
        </button>
        <button onclick="go('chat.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">💬 Chat</button>
        <button onclick="go('settings.html')" class="text-slate-500 hover:text-blue-600 transition font-semibold flex items-center gap-1">⚙️ Settings</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 md:px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <aside class="lg:col-span-4 space-y-6">
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm sticky top-24">
          <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
            <span>⚙️ Customize Profile</span>
          </h2>

          <div class="flex flex-col items-center mb-6">
            <div class="relative group">
              <img id="avatar" src="images/default-avatar.png" class="w-28 h-28 rounded-3xl object-cover border-4 border-white shadow-md transition group-hover:opacity-90" />
              <div class="absolute inset-0 bg-black/40 rounded-3xl opacity-0 group-hover:opacity-100 flex items-center justify-center transition pointer-events-none">
                <span class="text-white text-[10px] font-bold uppercase tracking-wider">New Image</span>
              </div>
            </div>
          </div>

          <div class="space-y-4">
            <div>
              <label class="text-[10px] uppercase font-black text-slate-400 ml-2 tracking-wide block mb-1">Upload New Avatar</label>
              <input type="file" id="profilePic" accept="image/*" onchange="previewAvatarLocal(this)" class="w-full text-xs text-slate-500 bg-slate-50 file:mr-3 file:py-2 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 rounded-xl p-2 border border-slate-100 shadow-inner cursor-pointer" />
            </div>

            <div>
              <label class="text-[10px] uppercase font-black text-slate-400 ml-2 tracking-wide block mb-1">Headline Bio</label>
              <textarea id="bio" placeholder="Your status headline..." rows="2" class="w-full p-3.5 bg-slate-50 border border-transparent rounded-xl outline-none focus:border-blue-400 focus:bg-white text-slate-700 text-sm resize-none transition-all shadow-inner"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[10px] uppercase font-black text-slate-400 ml-2 tracking-wide block mb-1">Age Metric</label>
                <input id="age" type="number" placeholder="Age" class="w-full p-3 bg-slate-50 border border-transparent rounded-xl outline-none focus:border-blue-400 focus:bg-white text-slate-700 text-sm transition-all shadow-inner" />
              </div>
              <div>
                <label class="text-[10px] uppercase font-black text-slate-400 ml-2 tracking-wide block mb-1">Gender</label>
                <select id="gender" class="w-full p-3 bg-slate-50 border border-transparent rounded-xl outline-none focus:border-blue-400 focus:bg-white text-slate-700 text-sm transition-all h-[46px] shadow-inner cursor-pointer">
                  <option value="">Unspecified</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
              </div>
            </div>

            <div>
              <label class="text-[10px] uppercase font-black text-slate-400 ml-2 tracking-wide block mb-1">Geographical Location</label>
              <input id="location" type="text" placeholder="City, Country" class="w-full p-3 bg-slate-50 border border-transparent rounded-xl outline-none focus:border-blue-400 focus:bg-white text-slate-700 text-sm transition-all shadow-inner" />
            </div>

            <div>
              <label class="text-[10px] uppercase font-black text-slate-400 ml-2 tracking-wide block mb-1">About Me Story</label>
              <textarea id="about" rows="3" placeholder="Tell the community about yourself..." class="w-full p-3.5 bg-slate-50 border border-transparent rounded-xl outline-none focus:border-blue-400 focus:bg-white text-slate-700 text-sm resize-none transition-all shadow-inner"></textarea>
            </div>

            <button onclick="updateProfile()" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-2xl font-bold transition shadow-md active:scale-[0.99] mt-2 text-sm">
              Save Profile Changes
            </button>
          </div>
        </div>
      </aside>

      <section class="lg:col-span-8 space-y-8">

        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
          
          <div class="relative h-56 bg-gradient-to-r from-blue-600 via-indigo-500 to-purple-600">
            <img id="coverPreview" class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-black/10"></div>
            <div class="absolute bottom-4 right-4 z-10">
              <label class="bg-white/20 backdrop-blur-md text-white border border-white/20 px-4 py-2 rounded-xl cursor-pointer hover:bg-white/30 transition text-xs font-bold tracking-wide shadow-sm uppercase">
                📸 Swap Cover
                <input type="file" id="coverImage" accept="image/*" onchange="previewCoverLocal(this)" class="hidden" />
              </label>
            </div>
          </div>

          <div class="p-8 pt-0">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 -mt-10 mb-8">
              
              <div class="bg-white/60 backdrop-blur-md p-4 rounded-2xl border border-white/40 shadow-sm inline-block">
                <h1 id="username" class="text-3xl font-black text-slate-800 tracking-tight leading-none">Loading Account...</h1>
                <p id="bioText" class="text-slate-500 text-sm mt-2 font-medium italic"></p>
              </div>

              <div class="flex gap-3">
                <div class="bg-blue-50/80 border border-blue-100 px-5 py-3 rounded-2xl text-center min-w-[90px] shadow-sm">
                  <p class="text-[9px] uppercase tracking-widest text-blue-400 font-black mb-0.5">Followers</p>
                  <p id="followersCount" class="text-xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-slate-50/80 border border-slate-100 px-5 py-3 rounded-2xl text-center min-w-[90px] shadow-sm">
                  <p class="text-[9px] uppercase tracking-widest text-slate-400 font-black mb-0.5">Following</p>
                  <p id="followingCount" class="text-xl font-black text-slate-700">0</p>
                </div>
              </div>
            </div>

            <div id="profile" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-slate-700 mb-8"></div>

            <button onclick="messageUser()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 transition duration-150 active:scale-[0.99] flex items-center justify-center gap-2 text-sm">
              💬 Direct Message Channel
            </button>
          </div>
        </div>

        <div>
          <h2 class="text-lg font-black text-slate-800 mb-4 px-1 flex items-center gap-2">
            📦 Broadcasted Entries
          </h2>
          <div id="postsContainer" class="space-y-6"></div>
        </div>

      </section>
    </div>
  </main>

  <script src="profile.js"></script>

  <script>
    function go(page) {
      window.location.href = page;
    }

    // LOCAL GRAPHICS PREVIEW HANDLING LOGIC
    function previewAvatarLocal(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById("avatar").src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function previewCoverLocal(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById("coverPreview").src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // AUTOMATIC SECURITY IDENTITY BOOT HANDLER
    window.addEventListener("DOMContentLoaded", () => {
      const userPayload = localStorage.getItem("user");
      if (!userPayload) {
        window.location.href = "auth.html";
        return;
      }
      
      const parsedUser = JSON.parse(userPayload);
      const targetId = parsedUser._id || parsedUser.id;
      
      // Fires loading script explicitly if the page logic hasn't already self-started
      if (typeof viewProfile === "function" && targetId) {
        // Keeps track of the dashboard view targeting
        if(!localStorage.getItem("profileUserId")) {
           localStorage.setItem("profileUserId", String(targetId));
        }
        viewProfile(String(localStorage.getItem("profileUserId")));
      }
    });
  </script>

</body>
</html>
