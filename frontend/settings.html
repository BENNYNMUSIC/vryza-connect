<!DOCTYPE html>
<html>
<head>
  <title>Settings - Vryza+</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="body" class="bg-slate-100 min-h-screen p-8">

  <div class="max-w-2xl mx-auto bg-white p-6 rounded-3xl shadow">

    <h1 class="text-3xl font-bold mb-6">
      ⚙️ Settings
    </h1>

    <!-- THEME -->
    <div class="mb-6">
      <h2 class="font-bold mb-2">Theme</h2>

      <button onclick="setDark()"
      class="bg-black text-white px-4 py-2 rounded-xl mr-2">
        Dark
      </button>

      <button onclick="setLight()"
      class="bg-gray-200 px-4 py-2 rounded-xl">
        Light
      </button>
    </div>

    <!-- SUPPORT -->
    <div class="mb-6">
      <h2 class="font-bold mb-2">Contact Support</h2>

      <textarea id="supportMessage"
      placeholder="Describe your problem..."
      class="w-full border p-3 rounded-xl"></textarea>

      <button onclick="sendSupport()"
      class="mt-3 bg-blue-600 text-white px-4 py-2 rounded-xl">
        Send Message
      </button>
    </div>

    <!-- LOGOUT -->
    <button onclick="logout()"
    class="w-full bg-red-500 text-white p-3 rounded-2xl font-bold">
      Logout
    </button>

  </div>

  <script src="settings.js"></script>

</body>
</html>
