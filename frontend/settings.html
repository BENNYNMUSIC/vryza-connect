<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Vryza+</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="shortcut icon" href="images/vryza connect.png" type="image/png" />

  <style>
    body {
      font-family: "Inter", sans-serif;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 20px;
    }
  </style>
</head>

<body id="body" class="bg-slate-100 text-slate-800 min-h-screen">

  <nav class="theme-card bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-2 rounded-xl">
          <img src="images/vryza connect.png" class="w-7 h-7 invert brightness-200" alt="logo" />
        </div>
        <h1 class="text-2xl font-black text-slate-800 dark-text-target">
          Vryza<span class="text-blue-600">+</span>
        </h1>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="window.location.href='home.html'" class="text-slate-600 hover:text-blue-600 font-semibold transition">🏠 Home</button>
        <button onclick="window.location.href='profile.html'" class="text-slate-600 hover:text-blue-600 font-semibold transition">👤 Profile</button>
        <button onclick="window.location.href='chat.html'" class="text-slate-600 hover:text-blue-600 font-semibold transition">💬 Chat</button>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto p-6">

    <div class="theme-card bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">

      <div class="px-8 py-6 border-b border-slate-100 theme-border-target">
        <h1 class="text-3xl font-black text-slate-800 dark-text-target">⚙️ Settings</h1>
        <p class="text-slate-400 mt-1">Customize your Vryza+ experience</p>
      </div>

      <div class="p-8 space-y-8">

        <div>
          <h2 class="text-lg font-bold text-slate-800 dark-text-target mb-4">🎨 UI Visual Style</h2>
          <div class="flex gap-3">
            <button onclick="setDark()" class="bg-slate-950 hover:bg-black text-white px-5 py-3 rounded-2xl font-semibold transition shadow-md active:scale-95">
              🌙 Dark Theme
            </button>
            <button onclick="setLight()" class="bg-slate-200 hover:bg-slate-300 text-slate-800 px-5 py-3 rounded-2xl font-semibold transition shadow-md active:scale-95">
              ☀️ Light Theme
            </button>
          </div>
        </div>

        <div>
          <h2 class="text-lg font-bold text-slate-800 dark-text-target mb-4">💬 Dispatch Message to Admin</h2>
          <textarea id="supportMessage" placeholder="Describe your technical problem or report here..." class="w-full min-h-[140px] bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-200 text-slate-800 resize-none transition shadow-inner"></textarea>
          
          <button id="supportBtn" onclick="sendSupport()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-semibold shadow-lg shadow-blue-100 transition active:scale-95">
            Submit Ticket
          </button>
        </div>

        <div class="pt-4 border-t border-slate-100 theme-border-target">
          <h2 class="text-lg font-bold text-slate-800 dark-text-target mb-4">🔒 Security Session Management</h2>
          <button onclick="logout()" class="w-full bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl font-bold transition shadow-md active:scale-[0.99]">
            Terminate Active Session (Logout)
          </button>
        </div>

      </div>
    </div>
  </main>

  <script src="settings.js"></script>

</body>
</html>
