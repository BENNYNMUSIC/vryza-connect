<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vryza+ Friends</title>

  <link rel="shortcut icon" href="images/vryza connect.png" type="image/x-icon" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Inter", sans-serif;
    }

    /* Custom elegant scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 20px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen overflow-x-hidden">

  <nav class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-2 rounded-xl shadow-lg">
          <img src="images/vryza connect.png" class="w-7 h-7 invert brightness-200" alt="logo" />
        </div>
        <h1 class="text-2xl font-black tracking-tight text-slate-800">
          Vryza<span class="text-blue-600">+</span>
        </h1>
      </div>

      <div class="flex items-center gap-6 text-sm">
        <button onclick="go('home.html')" class="text-slate-500 hover:text-blue-600 font-semibold transition">
          🏠 Home
        </button>

        <button onclick="go('friends.html')" class="relative text-blue-600 font-bold">
          👥 Friends
          <div class="absolute -bottom-2 left-0 w-full h-0.5 bg-blue-600 rounded-full"></div>
        </button>

        <button onclick="go('profile.html')" class="text-slate-500 hover:text-blue-600 font-semibold transition">
          👤 Profile
        </button>

        <button onclick="go('chat.html')" class="text-slate-500 hover:text-blue-600 font-semibold transition">
          💬 Chat
        </button>

        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl font-semibold transition">
          Logout
        </button>
      </div>

    </div>
  </nav>

  <main class="max-w-6xl mx-auto pt-28 pb-12 px-4 md:px-6">
    
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Following</h2>
        <p class="text-slate-500 text-sm mt-1">People you are connected with across Vryza+</p>
      </div>
      
      <div class="bg-white px-4 py-2 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-2 self-start sm:self-auto">
        <span class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-pulse"></span>
        <span id="friendCounter" class="text-xs font-bold text-slate-600 uppercase tracking-wider">Loading network...</span>
      </div>
    </div>

    <div id="friendsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <div class="bg-white p-6 rounded-3xl border border-slate-200 animate-pulse h-48 flex flex-col items-center justify-center">
        <div class="w-16 h-16 bg-slate-200 rounded-full mb-3"></div>
        <div class="w-24 h-4 bg-slate-200 rounded mb-2"></div>
        <div class="w-16 h-3 bg-slate-200 rounded"></div>
      </div>
    </div>

  </main>

  <script>
    const API_BASE_URL = "https://vryza-connect-backend-production.up.railway.app";
    const token = localStorage.getItem("token");

    // Secure Gatekeeper: redirect to auth if token is empty
    if (!token) {
      window.location.href = "auth.html";
    }

    // Navigation Routers
    function go(page) {
      window.location.href = page;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "auth.html";
    }

    // Instantly direct a conversation switch link
    function startChatWith(userId, username) {
      localStorage.setItem("chatUserId", userId);
      localStorage.setItem("chatUsername", username);
      window.location.href = "chat.html";
    }

    // ================= DATA LOGIC ENGINE =================
    async function loadFollowedFriends() {
      const grid = document.getElementById("friendsGrid");
      const counter = document.getElementById("friendCounter");

      try {
        // FIXED: URL changed from /api/users/friends to /api/friends to match backend setup
        const response = await fetch(`${API_BASE_URL}/api/friends`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          }
        });

        const data = await response.json();

        if (data && data.success && Array.isArray(data.friends)) {
          grid.innerHTML = ""; // Clear existing skeletons
          
          // Update Connection Counter text
          const count = data.friends.length;
          counter.textContent = `${count} Connect${count === 1 ? '' : 'ions'}`;

          if (count === 0) {
            grid.className = "block text-center py-12";
            grid.innerHTML = `
              <div class="max-w-md mx-auto bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                <span class="text-4xl">📭</span>
                <h3 class="text-lg font-bold text-slate-700 mt-4">No connections yet</h3>
                <p class="text-slate-400 text-sm mt-1 mb-6">Explore the home feed to find interesting profiles and follow them!</p>
                <button onclick="go('home.html')" class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-5 py-2.5 rounded-xl font-bold transition shadow-md shadow-blue-100">
                  Find People
                </button>
              </div>
            `;
            return;
          }

          // Restore layout grid format class parameters
          grid.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6";

          // Generate cards loop processing
          data.friends.forEach(friend => {
            const avatar = friend.profilePic || "images/default-avatar.png";
            
            const card = document.createElement("div");
            card.className = "bg-white p-5 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 flex flex-col items-center text-center";
            
            card.innerHTML = `
              <div class="relative mb-3">
                <img src="${avatar}" class="w-20 h-20 rounded-full object-cover border-2 border-slate-100 shadow-sm bg-slate-50" alt="${friend.username}" />
                <span class="absolute bottom-1 right-1 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></span>
              </div>
              
              <h3 class="font-bold text-slate-800 text-base truncate w-full px-2">${friend.username}</h3>
              <p class="text-xs text-slate-400 mt-0.5 mb-5">@${friend.username.toLowerCase()}</p>
              
              <button onclick="startChatWith('${friend._id}', '${friend.username}')" class="w-full bg-blue-50 hover:bg-blue-100 text-blue-600 py-2.5 rounded-2xl text-xs font-bold transition flex items-center justify-center gap-2">
                💬 Send Message
              </button>
            `;
            
            grid.appendChild(card);
          });

        } else {
          throw new Error("Invalid format received from server");
        }
      } catch (err) {
        console.error("Error loading friends list:", err);
        counter.textContent = "Error";
        grid.className = "block text-center py-12";
        grid.innerHTML = `
          <p class="text-red-500 font-semibold">Failed to fetch friends. Please try reloading the page.</p>
        `;
      }
    }

    // Trigger on structural readiness 
    document.addEventListener("DOMContentLoaded", loadFollowedFriends);
  </script>
</body>

</html>
