<!DOCTYPE html>
<html>
<head>
  <title>vryza connect</title>
  <link rel="shortcut icon" href="images/vryza connect.png" type="image/x-icon">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 350px;
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      background: #334155;
      color: white;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .toggle {
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      color: #38bdf8;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Login</h2>
    <input id="logEmail" placeholder="Email">
    <input id="logPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <div class="toggle" onclick="showSignup()">Don't have an account? Sign up</div>
  </div>

  <!-- SIGNUP -->
  <div id="signupBox" class="hidden">
    <h2>Sign Up</h2>
    <input id="regUser" placeholder="Username">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">Sign Up</button>

    <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
  </div>

</div>

<script src="loggin.js"></script>

</body>
</html>
